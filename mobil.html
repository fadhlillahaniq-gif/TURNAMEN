<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chrysler Racing - Nitro & Sound Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }

        #ui-speed {
            position: fixed; top: 20px; left: 20px; color: white;
            font-size: 22px; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10;
        }

        #cam-btn { 
            position: fixed; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 150, 255, 0.5); width: 60px; height: 60px; 
            border-radius: 50%; border: 3px solid white; color: white;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }

        .pedals-right {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 15px; align-items: center; z-index: 10;
        }
        .btn-pdl {
            width: 90px; height: 90px; border-radius: 15px; border: 4px solid white;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none; touch-action: none;
        }
        #nitro { background: linear-gradient(to bottom, #00f2ff, #0066ff); height: 60px; width: 150px; font-size: 20px; border-radius: 30px; }
        #gas { background: rgba(0, 255, 0, 0.4); height: 120px; font-size: 24px; }
        #brake { background: rgba(255, 0, 0, 0.4); font-size: 18px; }

        .steer-left {
            position: fixed; bottom: 30px; left: 30px;
            display: flex; gap: 20px; z-index: 10;
        }
        .btn-str {
            width: 90px; height: 90px; border-radius: 15px; border: 4px solid white;
            background: rgba(255, 255, 255, 0.2); display: flex; align-items: center;
            justify-content: center; color: white; font-size: 40px; user-select: none; touch-action: none;
        }

        #landscape-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white; z-index: 999;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        @media (orientation: portrait) { #landscape-warning { display: flex; } }
    </style>
</head>
<body>

    <div id="landscape-warning">
        <p style="font-size: 50px;">🔄</p>
        Miringkan HP Bos!
    </div>

    <div id="ui-speed">0 km/j</div>
    <div id="cam-btn">CAM</div>

    <div class="steer-left">
        <div id="left" class="btn-str">←</div>
        <div id="right" class="btn-str">→</div>
    </div>

    <div class="pedals-right">
        <div id="nitro" class="btn-pdl">NITRO 🔥</div>
        <div style="display: flex; gap: 20px;">
            <div id="brake" class="btn-pdl">REM</div>
            <div id="gas" class="btn-pdl">GAS</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, car, maps;
        let speed = 0;
        const input = { gas: false, brake: false, left: false, right: false, nitro: false };

        // Variabel Audio
        let engineSound, listener;

        const raycaster = new THREE.Raycaster();
        const arahBawah = new THREE.Vector3(0, -1, 0);

        let camMode = 1; 
        const camSettings = [
            { y: 500, z: -1200 },   // Mode 1: Deket Banget
            { y: 1500, z: -3500 },  // Mode 2: Pas
            { y: 6000, z: -8000 }   // Mode 3: Jauh
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20000, 150000);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 2.0));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(50000, 100000, -50000); 
            scene.add(sun);

            // === SETUP AUDIO ===
            listener = new THREE.AudioListener();
            camera.add(listener);

            engineSound = new THREE.PositionalAudio(listener);
            const audioLoader = new THREE.AudioLoader();
            audioLoader.load('assets/engine.mp3', (buffer) => {
                engineSound.setBuffer(buffer);
                engineSound.setRefDistance(500); // Jarak suara terdengar full
                engineSound.setLoop(true);
                engineSound.setVolume(0.5);
            });

            // Start audio pada sentuhan pertama (Syarat Browser)
            window.addEventListener('touchstart', () => {
                if (engineSound && !engineSound.isPlaying) engineSound.play();
            }, { once: true });

            const loader = new THREE.GLTFLoader();

            loader.load('assets/maps.glb', (gltf) => {
                maps = gltf.scene;
                maps.scale.set(500, 500, 500); 
                const box = new THREE.Box3().setFromObject(maps);
                const center = box.getCenter(new THREE.Vector3());
                maps.position.sub(center); 
                maps.position.y = 0; 
                scene.add(maps);
            });

            loader.load('assets/mobil.glb', (gltf) => {
                car = gltf.scene;
                car.scale.set(1.2, 1.2, 1.2); 
                car.position.set(0, 2000, 0); 
                scene.add(car);
                
                // Tempelkan suara ke mobil
                if (engineSound) car.add(engineSound);
            });

            setupControls();
            animate();
        }

        function setupControls() {
            const bind = (id, prop) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); input[prop] = true; el.style.opacity = "0.5"; });
                el.addEventListener('touchend', () => { input[prop] = false; el.style.opacity = "1"; });
            };
            bind('gas', 'gas');
            bind('brake', 'brake');
            bind('left', 'left');
            bind('right', 'right');
            bind('nitro', 'nitro');

            document.getElementById('cam-btn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                camMode = (camMode + 1) % 3;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (car && maps) {
                // Logika Kecepatan
                let maxSpeed = input.nitro ? 80.0 : 40.0;
                let accel = input.nitro ? 0.8 : 0.4;

                if (input.gas) speed = Math.min(speed + accel, maxSpeed); 
                else if (input.brake) speed = Math.max(speed - 1.5, -15.0); 
                else speed *= 0.985; 

                // === LOGIKA SUARA RACING (NGEEEEEENG) ===
              if (engineSound && engineSound.isPlaying) {
    let targetVolume = 0.2; // Suara mesin tipis pas diem
    let targetPitch = 1.0;  // Nada dasar rendah

    if (input.gas) {
        // Pas di-gas, volume langsung kenceng & stabil
        targetVolume = 0.9; 
        
        // Pitch naik berdasarkan gas + sedikit pengaruh dari speed biar realistis
        // Dia bakal teriak "NGEEEEEENG" di nada tinggi
        targetPitch = 1.8 + (Math.abs(speed) / 40); 
    } 
    
    if (input.nitro) {
        targetVolume = 1.0;
        targetPitch = 2.8; // Makin melengking pas nitro
    }

    // Ambil nilai suara saat ini
    let currentVolume = engineSound.getVolume();
    let currentPitch = engineSound.playbackRate;

    // TRANSISI HALUS (Biar pas lepas gas gak langsung mati total, tapi nge-drop alus)
    // Angka 0.05 bikin suara 'wind down' pas lepas gas lebih kerasa panjang
    engineSound.setVolume(currentVolume + (targetVolume - currentVolume) * 0.1);
    engineSound.setPlaybackRate(currentPitch + (targetPitch - currentPitch) * 0.05);
}

                // Belok
                let steerVal = 0;
                if (input.left) steerVal = 0.045;
                if (input.right) steerVal = -0.045;

                if (Math.abs(speed) > 0.1) {
                    car.rotation.y += steerVal * (speed > 0 ? 1 : -1);
                }
                
                car.translateZ(speed); 

                // Batas Dunia
                const limit = 80000;
                if (Math.abs(car.position.x) > limit || Math.abs(car.position.z) > limit) {
                    speed = 0;
                }

                // Raycaster (Deteksi Tanah)
                const titikAtas = new THREE.Vector3(car.position.x, car.position.y + 2000, car.position.z);
                raycaster.set(titikAtas, arahBawah);
                const pantulan = raycaster.intersectObject(maps, true);
                
                if (pantulan.length > 0) {
                    const tinggiTanah = pantulan[0].point.y;
                    car.position.y += (tinggiTanah - car.position.y) * 0.2;
                }

                // Update Kamera
                const mode = camSettings[camMode];
                let nitroZoom = input.nitro ? -500 : 0;
                
                const relativeOffset = new THREE.Vector3(0, mode.y, mode.z + nitroZoom);
                const cameraOffset = relativeOffset.applyMatrix4(car.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                
                const lookTarget = new THREE.Vector3(0, 500, 2500).applyMatrix4(car.matrixWorld);
                camera.lookAt(lookTarget);

                document.getElementById('ui-speed').innerText = Math.floor(Math.abs(speed * 10)) + " km/j";
            }
            
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
