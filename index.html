<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Mobil 3D HP - Bos</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }

        /* UI Speedometer */
        #ui-speed {
            position: fixed; top: 20px; left: 20px; color: white;
            font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }

        /* Kontrol Kanan (Gas & Rem) */
        .pedals {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }
        .btn {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid white;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none;
        }
        #gas { background: rgba(0, 255, 0, 0.4); }
        #brake { background: rgba(255, 0, 0, 0.4); }

        /* Joystick Kiri (Belok) */
        #joy-zone {
            position: fixed; bottom: 40px; left: 40px;
            width: 140px; height: 140px; background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); z-index: 10;
        }
        #joy-stick {
            position: absolute; top: 45px; left: 45px;
            width: 50px; height: 50px; background: white; border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="ui-speed">0 km/j</div>

    <div class="pedals">
        <div id="gas" class="btn">GAS</div>
        <div id="brake" class="btn">REM</div>
    </div>

    <div id="joy-zone">
        <div id="joy-stick"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- Inisialisasi ---
        let scene, camera, renderer, car, maps;
        let speed = 0, turnAngle = 0;
        const input = { gas: false, brake: false, steer: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lampu biar mobil Bos kelihatan kinclong
            const ambient = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            const loader = new THREE.THREE.GLTFLoader();

            // 1. Load Map
            loader.load('assets/maps.glb', (gltf) => {
                maps = gltf.scene;
                maps.traverse(n => { if(n.isMesh) n.receiveShadow = true; });
                scene.add(maps);
            });

            // 2. Load Mobil
            loader.load('assets/mobil.glb', (gltf) => {
                car = gltf.scene;
                car.traverse(n => { if(n.isMesh) n.castShadow = true; });
                car.position.set(0, 0.2, 0); 
                scene.add(car);
            });

            setupControls();
            animate();
        }

        function setupControls() {
            // Gas & Rem
            const btnGas = document.getElementById('gas');
            const btnBrake = document.getElementById('brake');

            const startGas = (e) => { e.preventDefault(); input.gas = true; };
            const stopGas = () => input.gas = false;
            const startBrake = (e) => { e.preventDefault(); input.brake = true; };
            const stopBrake = () => input.brake = false;

            btnGas.addEventListener('touchstart', startGas);
            btnGas.addEventListener('touchend', stopGas);
            btnBrake.addEventListener('touchstart', startBrake);
            btnBrake.addEventListener('touchend', stopBrake);

            // Joystick (Belok)
            const joyZone = document.getElementById('joy-zone');
            const joyStick = document.getElementById('joy-stick');

            joyZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = joyZone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                let dx = touch.clientX - centerX;
                
                // Batasi gerakan stick
                dx = Math.max(-50, Math.min(50, dx));
                joyStick.style.transform = `translateX(${dx}px)`;
                input.steer = dx / 50; // Hasil -1 sampai 1
            });

            joyZone.addEventListener('touchend', () => {
                joyStick.style.transform = `translateX(0px)`;
                input.steer = 0;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                // Logika Maju/Mundur
                if (input.gas) speed = Math.min(speed + 0.005, 0.4);
                else if (input.brake) speed = Math.max(speed - 0.01, -0.1);
                else speed *= 0.97; // Gesekan aspal

                // Logika Belok
                if (Math.abs(speed) > 0.01) {
                    car.rotation.y -= input.steer * 0.04 * (speed > 0 ? 1 : -1);
                }

                car.translateZ(speed);

                // Kamera Follow
                const offset = new THREE.Vector3(-8, 4, 0);
                const camPos = offset.applyMatrix4(car.matrixWorld);
                camera.position.lerp(camPos, 0.1);
                camera.lookAt(car.position);

                document.getElementById('ui-speed').innerText = Math.floor(Math.abs(speed * 300)) + " km/j";
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
